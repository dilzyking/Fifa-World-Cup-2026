<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIFA WORLD CUP LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(180deg,#02122f,#041b47,#06265e);
    min-height:100vh;
    overflow-x:hidden;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px 15px 15px;
}

.header h1{
    color:#fff;
    font-size:34px;
    font-weight:800;
    letter-spacing:3px;
    text-transform:uppercase;
    text-shadow:
        0 0 10px rgba(255,255,255,.3),
        0 0 25px rgba(0,119,255,.5);
}

.header-line{
    width:95%;
    height:3px;
    margin:auto;
    border-radius:50px;
    background:linear-gradient(90deg,#00a2ff,#4fc3ff,#00a2ff);
    box-shadow:0 0 15px #00a2ff;
}

/* POSTER */
.poster-section{
    position:relative;
    width:100%;
    margin-top:18px;
}

.poster{
    width:100%;
    display:block;
}

.match-title{
    position:absolute;
    left:15px;
    bottom:18px;
}

.match-title h2{
    color:#fff;
    font-size:34px;
    font-weight:800;
    text-transform:uppercase;
    line-height:1.1;
    text-shadow:
        0 0 10px rgba(0,0,0,.9),
        0 0 25px rgba(0,0,0,.9),
        3px 3px 8px rgba(0,0,0,.9);
}

/* CHANNELS */
.channels-section{
    padding:20px 12px 40px;
}

.section-title{
    color:#fff;
    font-size:24px;
    font-weight:800;
    margin-bottom:15px;
    text-transform:uppercase;
}

.channel-card{
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:15px;
    padding:10px;
    margin-bottom:10px;
}

.channel-thumb{
    width:70px;
    height:70px;
    border-radius:12px;
    object-fit:cover;
}

.channel-name{
    flex:1;
    color:#fff;
    font-size:17px;
    font-weight:700;
    text-transform:uppercase;
}

.link-btn{
    border:none;
    background:#0078ff;
    color:#fff;
    padding:10px 16px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    width:92%;
    max-width:500px;
    background:#071734;
    border:1px solid rgba(255,255,255,.1);
    border-radius:16px;
    padding:20px;
}

.popup-title{
    color:#fff;
    font-size:22px;
    font-weight:800;
    margin-bottom:15px;
}

.popup-input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#02112e;
    color:#fff;
    margin-bottom:12px;
}

.copy-btn{
    width:100%;
    border:none;
    background:#0078ff;
    color:#fff;
    padding:12px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

.close-btn{
    width:100%;
    border:none;
    background:#ff2d55;
    color:#fff;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    font-weight:700;
    cursor:pointer;
}

/* TOAST */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#0078ff;
    color:#fff;
    padding:12px 20px;
    border-radius:10px;
    display:none;
    z-index:10000;
    font-weight:700;
}

@media(max-width:768px){

.header h1{
    font-size:26px;
}

.match-title h2{
    font-size:20px;
}

.channel-thumb{
    width:60px;
    height:60px;
}

.channel-name{
    font-size:15px;
}

.link-btn{
    padding:8px 12px;
}

}
</style>
</head>
<body>

<div class="header">
    <h1>FIFA WORLD CUP</h1>
</div>

<div class="header-line"></div>

<div class="poster-section">

    <img
    class="poster"
    src="https://a3.espncdn.com/combiner/i?img=%2Fphoto%2F2026%2F0608%2Fr1669698_1296x729_16%2D9.png&w=1140&cquality=40&format=jpg"
    alt="World Cup Poster">

    <div class="match-title">
        <h2>SOUTH AFRICA<br>VS MEXICO</h2>
    </div>

</div>

<section class="channels-section">

    <h2 class="section-title">ALL CHANNELS</h2>

    <div id="channels">
        Loading channels...
    </div>

</section>

<div class="popup" id="popup">

    <div class="popup-box">

        <div class="popup-title">
            COPY CHANNEL LINK
        </div>

        <input
        id="popupInput"
        class="popup-input"
        readonly>

        <button
        class="copy-btn"
        onclick="copyLink()">

            COPY LINK

        </button>

        <button
        class="close-btn"
        onclick="closePopup()">

            CLOSE

        </button>

    </div>

</div>

<div class="toast" id="toast">
    Link Copied Successfully
</div>

<script>

const API =
'https://fifa-world-cup-live.pages.dev/id.json';

fetch(API)
.then(response => response.json())
.then(data => {

    const container =
    document.getElementById('channels');

    container.innerHTML = '';

    data.forEach(channel => {

        container.innerHTML += `
        <div class="channel-card">

            <img
            class="channel-thumb"
            src="${channel.thumbnail}"
            alt="${channel.name}">

            <div class="channel-name">
                ${channel.name}
            </div>

            <button
            class="link-btn"
            onclick="showPopup('${channel.iframe}')">

                GET LINK

            </button>

        </div>
        `;
    });

})
.catch(() => {

    document.getElementById('channels').innerHTML =
    '<div style="color:white">Failed to load channels.</div>';

});

function showPopup(link){

    document.getElementById('popup').style.display =
    'flex';

    document.getElementById('popupInput').value =
    link;
}

function closePopup(){

    document.getElementById('popup').style.display =
    'none';
}

function copyLink(){

    const text =
    document.getElementById('popupInput').value;

    navigator.clipboard.writeText(text);

    const toast =
    document.getElementById('toast');

    toast.style.display='block';

    setTimeout(()=>{
        toast.style.display='none';
    },2000);
}

</script>

</body>
  </html>
